<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D0A3E"/>
      <stop offset="50%" stop-color="#4A0E5C"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#BF40BF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B2D8E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C5F0"/>
      <stop offset="50%" stop-color="#D4A5E5"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="petal-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A5E5"/>
      <stop offset="100%" stop-color="#7B2D8E"/>
    </linearGradient>
    <linearGradient id="petal-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF40BF"/>
      <stop offset="100%" stop-color="#7B2D8E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="100" fill="url(#glow)"/>
  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="95" fill="none" stroke="#9B59B6" stroke-width="0.8" opacity="0.4"/>
  <!-- Cherry Blossom -->
  <g transform="translate(128,110)" filter="url(#shadow)">
    <!-- Petals -->
    <path d="M0,-55 C18,-48 30,-32 24,-18 C18,-4 6,2 0,0 C-6,2 -18,-4 -24,-18 C-30,-32 -18,-48 0,-55Z" fill="url(#petal)" transform="rotate(0)" opacity="0.95"/>
    <path d="M0,-55 C18,-48 30,-32 24,-18 C18,-4 6,2 0,0 C-6,2 -18,-4 -24,-18 C-30,-32 -18,-48 0,-55Z" fill="url(#petal-dark)" transform="rotate(72)" opacity="0.85"/>
    <path d="M0,-55 C18,-48 30,-32 24,-18 C18,-4 6,2 0,0 C-6,2 -18,-4 -24,-18 C-30,-32 -18,-48 0,-55Z" fill="url(#petal-accent)" transform="rotate(144)" opacity="0.9"/>
    <path d="M0,-55 C18,-48 30,-32 24,-18 C18,-4 6,2 0,0 C-6,2 -18,-4 -24,-18 C-30,-32 -18,-48 0,-55Z" fill="url(#petal-dark)" transform="rotate(216)" opacity="0.85"/>
    <path d="M0,-55 C18,-48 30,-32 24,-18 C18,-4 6,2 0,0 C-6,2 -18,-4 -24,-18 C-30,-32 -18,-48 0,-55Z" fill="url(#petal)" transform="rotate(288)" opacity="0.95"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="12" fill="#E8C5F0" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#FFF" opacity="0.6"/>
  </g>
  <!-- H letterform integrated -->
  <g transform="translate(128,180)" filter="url(#glow-filter)">
    <text text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="bold" fill="#E8C5F0" letter-spacing="6" opacity="0.9">紫</text>
  </g>
  <!-- Decorative dots -->
  <circle cx="48" cy="48" r="2" fill="#D4A5E5" opacity="0.4"/>
  <circle cx="208" cy="48" r="2" fill="#D4A5E5" opacity="0.4"/>
  <circle cx="48" cy="208" r="1.5" fill="#9B59B6" opacity="0.3"/>
  <circle cx="208" cy="208" r="1.5" fill="#9B59B6" opacity="0.3"/>
</svg>
